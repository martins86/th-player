<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Aplicativo IPTV para assistir TV online. O TH Player oferece uma experiência de streaming de alta qualidade, com suporte a múltiplos formatos e uma interface intuitiva. Assista seus canais favoritos, séries e filmes em qualquer lugar, a qualquer hora."
    />
    <!-- Favicon Standard -->
    <link rel="shortcut icon" href="/th-player/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/th-player/images/favicons/favicon-16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/th-player/images/favicons/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="/th-player/images/favicons/favicon-48.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="/th-player/images/favicons/favicon-64.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="128x128"
      href="/th-player/images/favicons/favicon-128.png"
    />
    <!-- Apple Touch Icons (iOS) -->
    <link rel="apple-touch-icon" sizes="120x120" href="/th-player/images/favicons/ios-120.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/th-player/images/favicons/ios-180.png" />
    <link rel="apple-touch-icon" sizes="1024x1024" href="/th-player/images/favicons/ios-1024.png" />
    <!-- Android Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/th-player/images/favicons/android-192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/th-player/images/favicons/android-512.png"
    />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/th-player/manifest.webmanifest" />
    <title>TH Player - Aplicativo IPTV para assistir TV online.</title>
    <base href="/th-player/" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
