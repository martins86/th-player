name: CI/CD — TH Player webOS

permissions:
  contents: write
  pages: write

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'appinfo.json'
      - '.github/workflows/ci-cd.yml'
    branches: [master, develop]
  push:
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'appinfo.json'
      - '.github/workflows/ci-cd.yml'
    branches: [master, develop]
  schedule:
    - cron: '0 9 * * 1,2,3,4,5'

jobs:
  # ===== LINT & FORMAT =====
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ===== TYPE CHECK =====
  type-check:
    name: 📘 TypeScript Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  # ===== TESTS =====
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
          verbose: true

  # ===== SECURITY =====
  security:
    name: 🔒 Security Review
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate installed packages
        run: |
          echo "Validating installed package tree..."
          npm ls --all || true

      - name: Run npm audit
        run: |
          echo "Running npm audit..."
          npm audit --json > audit-report.json || true
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
          const vulnerabilities = report.metadata?.vulnerabilities || {};
          const total = Object.values(vulnerabilities).reduce((sum, value) => sum + value, 0);
          if (total === 0) {
            console.log('No vulnerabilities found.');
            process.exit(0);
          }
          const severityLevels = ['critical', 'high', 'moderate', 'low'];
          severityLevels.forEach((level) => {
            const count = vulnerabilities[level] || 0;
            if (count > 0) {
              console.warn(`::warning title=Security Review::${count} ${level} vulnerability(ies) found`);
            }
          });
          process.exit(0);
          NODE

  # ===== BUILD =====
  build:
    name: 🔨 Build
    needs: [lint, type-check, test]
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version
        id: version
        run: |
          echo "version=$(grep '\"version\"' package.json | head -1 | awk -F: '{ print $2 }' | sed 's/[\",]//g')" >> $GITHUB_OUTPUT

      - name: Build app
        run: npm run build:ci

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/
          retention-days: 5

